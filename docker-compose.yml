version: '3.8'

services:
  # PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    container_name: coinvest-postgres
    environment:
      POSTGRES_DB: coinvest
      POSTGRES_USER: coinvest
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U coinvest" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coinvest-network

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: coinvest-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coinvest-network

volumes:
  postgres_data:
  redis_data:

networks:
  coinvest-network:
    driver: bridge
