services:
  nginx:
    image: nginx:stable-alpine
    container_name: coinvest-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    environment:
      - TZ=Asia/Seoul
    networks:
      - coinvest-network
    restart: always

  frontend:
    image: ${DOCKERHUB_USERNAME}/coinvest-frontend:latest
    container_name: coinvest-frontend
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          memory: 300M
    env_file:
      - .env
    environment:
      - TZ=Asia/Seoul
    depends_on:
      - backend
    networks:
      - coinvest-network
    restart: always

  backend:
    image: ${DOCKERHUB_USERNAME}/coinvest-app:latest
    container_name: coinvest-app
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 450M
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${DB_NAME:-coinvest}
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-coinvest}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - JAVA_OPTS=-Xmx256m -Xms256m
      - TZ=Asia/Seoul
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - coinvest-network
    restart: always

  db:
    image: postgres:16-alpine
    container_name: coinvest-db
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 150M
    environment:
      - POSTGRES_DB=${DB_NAME:-coinvest}
      - POSTGRES_USER=${DB_USER:-coinvest}
      - POSTGRES_PASSWORD=${DB_PASS}
      - TZ=Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-coinvest} -d ${DB_NAME:-coinvest}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - coinvest-network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: coinvest-redis
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 100M
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - coinvest-network
    restart: always

networks:
  coinvest-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: