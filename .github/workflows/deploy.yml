name: CoinVest CI/CD (Quality Guard & Discord Alert)

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Backend Build & Test
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Backend Tests
        run: |
          chmod +x backend/gradlew
          cd backend && ./gradlew test --continue
        env:
          JWT_SECRET: dummy_secret_key_for_ci_test_at_least_64_chars_long_!!_1234567890
          APP_SECURITY_AES_KEY: dummy_32_byte_aes_key_for_ci_test_!!
          KIS_APP_KEY: dummy_key
          KIS_APP_SECRET: dummy_secret

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: backend/build/reports/tests/test/

      - name: Build Backend JAR
        if: success()
        run: cd backend && ./gradlew bootJar -x test

      # 2. Docker Setup & Login
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Build & Push Images (AMD64)
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/coinvest-app:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/coinvest-frontend:latest

      # 빌드 실패 알림
      - name: Discord Notification (Build Failure)
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: failure
          title: "❌ CoinVest 빌드/테스트 실패"
          description: |
            **단계**: `Build & Push`
            **사유**: 코드 컴파일 또는 단위 테스트 실패 (리포트 확인 요망)
          color: 0xff0000

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (for deploy config)
        uses: actions/checkout@v4

      - name: Copy Config files to OCI
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "docker-compose.yml,nginx/default.conf"
          target: "~/coinvest"

      - name: Deploy to Oracle Cloud via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -e
            cd ~/coinvest
            
            # .env 파일 생성 (Secrets에서 관리되는 운영용 환경변수)
            cat <<'EOF' > .env
            ${{ secrets.APP_ENV_FILE }}
            EOF
            
            # 최신 이미지 풀 및 재시작
            docker-compose pull
            docker-compose up -d
            
            # 1. Redis 준비 확인
            echo "Checking Redis health..."
            SUCCESS=false
            for i in {1..20}; do
              if docker-compose exec -T redis redis-cli ping 2>/dev/null | grep -q "PONG"; then
                echo "Redis is ready!"
                SUCCESS=true
                break
              fi
              sleep 1
            done
            if [ "$SUCCESS" = false ]; then echo "Redis timeout"; exit 1; fi
            
            # 2. 웹 서비스 응답 확인
            echo "Waiting for Web Service to be ready..."
            WEB_READY=0
            for i in {1..30}; do
              if curl -s -o /dev/null -w "%{http_code}" http://localhost | grep -q "^[23]"; then
                echo "✅ Web Service is UP!"
                WEB_READY=1
                break
              fi
              sleep 2
            done
            
            if [ "$WEB_READY" = 0 ]; then
              docker-compose logs --tail=50 backend
              exit 1
            fi
            
            docker image prune -af

      # 성공/실패 알림
      - name: Discord Notification (Deploy Result)
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: ${{ job.status == 'success' && '🚀 CoinVest 배포 성공 ✅' || '❌ CoinVest 배포 실패' }}
          description: |
            **상태**: 운영 서버 배포 결과 (${{ job.status }})
            **커밋**: `${{ github.event.head_commit.message }}`
            **URL**: `http://${{ secrets.OCI_HOST }}`
          color: ${{ job.status == 'success' && '0x00ff00' || '0xff0000' }}
