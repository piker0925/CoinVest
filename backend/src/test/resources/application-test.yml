spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/coinvest_test

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    root: WARN
    com.coinvest: DEBUG
    org.hibernate.SQL: WARN
