spring:
  main:
    allow-bean-definition-overriding: true
  
  test:
    database:
      # Testcontainers 사용 시 실제 DB(Postgres)를 H2로 자동 교체하는 것을 방지
      replace: none

  # AbstractIntegrationTest의 @DynamicPropertySource가 런타임에 도커 컨테이너 정보를 주입함
  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true

kis:
  api:
    base-url: http://localhost:9999
    app-key: dummy
    app-secret: dummy

jwt:
  secret: dummy_secret_key_for_test_purposes_only_at_least_64_chars_long_!!_1234567890
