spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/coinvest
    username: coinvest
    password: password
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: coinvest-local
      max-poll-records: 500
      session-timeout-ms: 30000

jwt:
  secret: zAt8Wvpx6pY5E2dG9nK3mJ7rQ4u7x!A%D*G-KaPdSgVkYp3s6v9y$B?E(H+MbQeThWmZq4t7w!z%C*F-JaNcRfUjXn2r5u8x/A?D(G+KbPeSgVkYp3s6v9y$B&E)H@Mc
  access-token-expiration: 1800000 # 30분 (30 * 60 * 1000)
  refresh-token-expiration: 604800000 # 7일 (7 * 24 * 60 * 60 * 1000)

logging:
