spring:
  application:
    name: coinvest
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    defer-datasource-initialization: true # Flyway 이후에 data.sql 실행 보장
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true

  flyway:
    locations: classpath:db/migration
    enabled: true

  threads:
    virtual:
      enabled: true

jwt:
  secret: ${JWT_SECRET:local_development_secret_key_random_string_at_least_64_chars_long_!!_secure_1234567890}
  access-token-expiration: 3600000 # 1 hour
  refresh-token-expiration: 1209600000 # 14 days

trading:
  bot:
    enabled: false

upbit:
  websocket:
    url: wss://api.upbit.com/websocket/v1

kis:
  api:
    base-url: https://openapi.koreainvestment.com:9443
    app-key: ${KIS_APP_KEY:}
    app-secret: ${KIS_APP_SECRET:}

coinvest:
  alerts:
    system-webhook-url: ${SYSTEM_DISCORD_WEBHOOK_URL:}

server:
  port: 8080
  shutdown: graceful
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.coinvest: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "[%d{HH:mm:ss.SSS}] [%-5level] [%thread] %logger{36} - %msg%n"
