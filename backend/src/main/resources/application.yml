spring:
  application:
    name: coinvest
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true

  flyway:
    locations: classpath:db/migration
    enabled: true

  threads:
    virtual:
      enabled: true

trading:
  bot:
    enabled: false

upbit:
  websocket:
    url: wss://api.upbit.com/websocket/v1

kis:
  api:
    base-url: https://openapi.koreainvestment.com:9443
    app-key: ${KIS_APP_KEY:}
    app-secret: ${KIS_APP_SECRET:}

yahoo:
  api:
    base-url: https://query1.finance.yahoo.com/v7/finance/quote

coinvest:
  alerts:
    system-webhook-url: ${SYSTEM_DISCORD_WEBHOOK_URL:}

server:
  port: 8080
  shutdown: graceful
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.coinvest: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "[%d{HH:mm:ss.SSS}] [%-5level] [%thread] %logger{36} - %msg%n"
